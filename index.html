<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Calculadora de IMC" />
    <meta name="author" content="Seu Nome" />
    <title>Calculadora de IMC</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i" rel="stylesheet" type="text/css" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Muli', sans-serif;
            color: #212529;
            background-color: #f8f9fa;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Saira Extra Condensed', sans-serif;
            font-weight: 700;
            color: #343a40;
        }

        label {
            font-weight: 700;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ced4da;
            margin-bottom: 20px;
        }

        button {
            display: inline-block;
            font-weight: 700;
            color: #fff;
            background-color: #007bff;
            border-color: #007bff;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.15s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de IMC</h1>
        <form id="imcForm">
            <div>
                <label for="altura">Altura (m):</label>
                <input type="number" step="0.01" id="altura" name="altura" required />
            </div>
            <div>
                <label for="peso">Peso (kg):</label>
                <input type="number" step="0.01" id="peso" name="peso" required />
            </div>
            <button type="submit">Calcular IMC</button>
        </form>
        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById('imcForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const altura = parseFloat(document.getElementById('altura').value);
            const peso = parseFloat(document.getElementById('peso').value);

            if (altura && peso) {
                const imc = peso / (altura * altura);
                const resultado = document.getElementById('resultado');
                resultado.innerHTML = `Seu IMC é: ${imc.toFixed(2)}`;
            } else {
                alert('preencha os campos de altura e peso.');
            }
        });
    </script>
</body>
</html>
